name: Bollydrive Scraper

on:
  # ── Auto: every day at 5:00 PM Bangladesh time (= 11:00 AM UTC) ──────────
  schedule:
    - cron: "0 11 * * *"

  # ── Manual override: optionally force a specific start ID ────────────────
  workflow_dispatch:
    inputs:
      override_start_id:
        description: "Force start from this ID (leave blank to auto-resume)"
        required: false
        default: ""

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 300        # 5h hard cap — scraper stops itself at 4h55m
    permissions:
      contents: write           # needed to commit result + state files

    steps:
      # ── 1. Checkout (includes state.txt + result files from last run) ───
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install deps ────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Show current state ──────────────────────────────────────────
      - name: Show resume state and existing data
        run: |
          if [ -f state.txt ]; then
            echo "▶️  Resuming from ID: $(cat state.txt)"
          else
            echo "▶️  No state.txt found — starting from ID 1 (first run)"
          fi
          for f in 1found.txt notfound.txt error.txt; do
            if [ -f "$f" ]; then
              echo "$f: $(wc -l < $f) lines stored"
            else
              echo "$f: (new — first run)"
            fi
          done

      # ── 5. Run scraper (auto-resume or manual override) ────────────────
      - name: Run scraper
        run: |
          OVERRIDE="${{ github.event.inputs.override_start_id }}"
          if [ -n "$OVERRIDE" ]; then
            echo "Manual override: starting from ID $OVERRIDE"
            python scraper.py "$OVERRIDE"
          else
            echo "Auto-resume from state.txt"
            python scraper.py
          fi

      # ── 6. Deduplicate result files (post-run safety net) ──────────────
      - name: Deduplicate result files
        run: |
          for f in 1found.txt notfound.txt error.txt; do
            if [ -f "$f" ]; then
              awk -F'|' '!seen[$1]++' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
              echo "$f after dedup: $(wc -l < $f) lines"
            fi
          done

      # ── 7. Commit result files + state back to repo ────────────────────
      - name: Commit results and state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create files if they don't exist yet (first run safety)
          touch 1found.txt notfound.txt error.txt state.txt

          git add 1found.txt notfound.txt error.txt state.txt

          NEXT_ID=$(cat state.txt 2>/dev/null || echo "?")
          git diff --cached --quiet || git commit -m \
            "scraper: run #${{ github.run_number }} | next_id=${NEXT_ID}"
          git push

      # ── 8. Print summary ───────────────────────────────────────────────
      - name: Print result summary
        if: always()
        run: |
          echo "=== FOUND ==="
          wc -l 1found.txt   2>/dev/null || echo "(empty)"
          echo "=== NOT FOUND ==="
          wc -l notfound.txt 2>/dev/null || echo "(empty)"
          echo "=== ERRORS ==="
          wc -l error.txt    2>/dev/null || echo "(empty)"
          echo "=== NEXT START ID ==="
          cat state.txt      2>/dev/null || echo "(not saved)"

      # ── 9. Upload artifacts ────────────────────────────────────────────
      - name: Upload result files as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results-${{ github.run_number }}
          path: |
            1found.txt
            notfound.txt
            error.txt
            state.txt
          retention-days: 90
          if-no-files-found: ignore

      # ── 10. Fail job if server blocked ─────────────────────────────────
      - name: Check for server block
        if: always()
        run: |
          if grep -q "BLOCKED\|BLOCK DETECTED" error.txt 2>/dev/null; then
            echo "::error::Server block detected — check error.txt"
            exit 1
          fi
